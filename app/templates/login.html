<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dispatch Suivi — Connexion</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body class="login-body">
    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-logo">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 64 64"
            fill="none"
          >
            <rect width="64" height="64" rx="16" fill="#1E3A5F" />
            <path
              d="M10 40 L18 24 H46 L54 40 H10Z"
              fill="#F5A623"
              stroke="#fff"
              stroke-width="1.5"
            />
            <circle cx="20" cy="42" r="5" fill="#fff" />
            <circle cx="44" cy="42" r="5" fill="#fff" />
            <rect x="26" y="28" width="12" height="8" rx="1" fill="#1E3A5F" />
          </svg>
        </div>
        <h1 class="login-title">My Trips</h1>
        <p class="login-sub">
          Connectez-vous avec les identifiants de votre société
        </p>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="form-group">
            <label for="email">Login</label>
            <input
              id="email"
              name="email"
              required
              autofocus
            />
          </div>
          <div class="form-group">
            <label for="password">Mot de passe</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
            />
          </div>
          <button type="submit" class="btn-primary btn-full">
            Se connecter
          </button>
        </form>
      </div>
      <p class="login-footer">
        Identifiants gérés dans la feuille <strong>Societes</strong> du fichier
        Excel.
      </p>
    </div>
  </body>
</html>
